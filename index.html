<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ferretería Parada — Catálogo Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>/* ================================
   VARIABLES & RESET
================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --orange:       #F97316;
  --orange-dark:  #EA580C;
  --orange-dim:   rgba(249,115,22,0.12);
  --orange-glow:  rgba(249,115,22,0.25);
  --bg:           #0F172A;
  --surface:      #1E293B;
  --card:         #1E293B;
  --card-hover:   #263548;
  --border:       #334155;
  --border-light: #475569;
  --text:         #F8FAFC;
  --text-2:       #CBD5E1;
  --text-3:       #64748B;
  --success:      #22C55E;
  --danger:       #EF4444;
  --info:         #3B82F6;
  --wa:           #25D366;
  --radius-sm:    6px;
  --radius-md:    12px;
  --radius-lg:    16px;
  --radius-xl:    22px;
  --shadow-sm:    0 1px 4px rgba(0,0,0,0.3);
  --shadow-md:    0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg:    0 8px 32px rgba(0,0,0,0.5);
  --shadow-orange:0 4px 20px rgba(249,115,22,0.3);
  --font:         'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --ease:         cubic-bezier(0.4,0,0.2,1);
  --transition:   all 0.2s var(--ease);
}

.light-mode {
  --bg:           #F1F5F9;
  --surface:      #FFFFFF;
  --card:         #FFFFFF;
  --card-hover:   #F8FAFC;
  --border:       #E2E8F0;
  --border-light: #CBD5E1;
  --text:         #0F172A;
  --text-2:       #334155;
  --text-3:       #94A3B8;
  --shadow-sm:    0 1px 4px rgba(0,0,0,0.06);
  --shadow-md:    0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg:    0 8px 32px rgba(0,0,0,0.10);
}

html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: var(--font); border: none; background: none; }
select, input, textarea { font-family: var(--font); }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

/* ================================
   TOPBAR
================================ */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow-sm);
}

.logo {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
  user-select: none;
}
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: var(--shadow-orange);
  flex-shrink: 0;
}
.logo-text-wrap { display: flex; flex-direction: column; }
.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.3px;
}
.logo-sub {
  font-size: 10px;
  font-weight: 500;
  color: var(--orange);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.top-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 38px; height: 38px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-3);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  transition: var(--transition);
}
.icon-btn:hover {
  background: var(--orange-dim);
  border-color: var(--orange);
  color: var(--orange);
}

/* ================================
   TABS (desktop)
================================ */
.view-tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.tab {
  flex: 1; padding: 11px;
  text-align: center;
  color: var(--text-3);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  cursor: pointer; border: none; background: none;
  position: relative;
  transition: var(--transition);
}
.tab:hover { color: var(--text-2); }
.tab.active { color: var(--orange); }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--orange);
  border-radius: 2px 2px 0 0;
}
.tab-icon { font-size: 15px; display: block; margin-bottom: 2px; }

/* ================================
   HERO
================================ */
.catalog-view { padding-bottom: 0; }

.hero {
  background: linear-gradient(160deg, #0F172A 0%, #1a1f35 50%, #1a2033 100%);
  padding: 28px 20px 24px;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.light-mode .hero { background: linear-gradient(160deg, #1E293B 0%, #263040 100%); }

.hero::before {
  content: '';
  position: absolute; top: -60px; right: -60px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 65%);
  pointer-events: none;
}
.hero::after {
  content: '';
  position: absolute; bottom: -30px; left: -30px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 65%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--orange-dim);
  border: 1px solid rgba(249,115,22,0.35);
  color: var(--orange);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}
.hero-title {
  font-family: 'Bebas Neue', var(--font);
  font-size: 36px;
  letter-spacing: 1.5px;
  color: #F8FAFC;
  line-height: 1.1;
  margin-bottom: 6px;
}
.hero-accent { color: var(--orange); }
.hero-sub { font-size: 13px; color: #94A3B8; margin-bottom: 18px; font-weight: 400; }

.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 15px; color: var(--text-3);
  pointer-events: none; z-index: 1;
}
.search-input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-lg);
  padding: 12px 44px 12px 44px;
  color: #F8FAFC;
  font-size: 14px;
  font-weight: 400;
  outline: none;
  transition: var(--transition);
  backdrop-filter: blur(8px);
}
.search-input::placeholder { color: #475569; }
.search-input:focus {
  border-color: var(--orange);
  background: rgba(249,115,22,0.06);
  box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
}
.light-mode .search-input {
  background: rgba(15,23,42,0.06);
  border-color: var(--border);
  color: var(--text);
}
.light-mode .search-input::placeholder { color: var(--text-3); }
.search-clear {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text-3); font-size: 14px;
  cursor: pointer; padding: 4px;
  transition: var(--transition);
}
.search-clear:hover { color: var(--orange); }

/* ================================
   CATALOG BODY
================================ */
.catalog-body { padding: 14px 16px 0; }

/* SHARE BAR */
.share-bar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px 14px;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  box-shadow: var(--shadow-sm);
}
.share-label { font-size: 11px; font-weight: 600; color: var(--text-3); letter-spacing: 0.5px; white-space: nowrap; }
.share-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.share-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 13px;
  border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.2px;
}
.share-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
.share-wa   { background: var(--wa); color: #fff; }
.share-fb   { background: #1877F2; color: #fff; }
.share-copy { background: var(--border); color: var(--text-2); border: 1px solid var(--border-light); }

/* FILTERS */
.filters-row {
  display: flex; gap: 8px;
  overflow-x: auto; padding-bottom: 6px; margin-bottom: 10px;
  scrollbar-width: none;
}
.filters-row::-webkit-scrollbar { display: none; }
.chip {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  color: var(--text-3);
  transition: var(--transition);
}
.chip:hover { border-color: var(--orange); color: var(--orange); }
.chip.active {
  background: var(--orange);
  border-color: var(--orange);
  color: #fff;
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(249,115,22,0.35);
}

/* SORT ROW */
.sort-row {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.results-label { font-size: 12px; color: var(--text-3); font-weight: 500; }
.sort-select {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-size: 12px; font-weight: 500;
  color: var(--text-2);
  cursor: pointer; outline: none;
  transition: var(--transition);
}
.sort-select:focus { border-color: var(--orange); }
.light-mode .sort-select { background: #fff; }

/* ================================
   PRODUCT GRID
================================ */
.products-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media (min-width: 480px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 700px) { .products-grid { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 960px) { .products-grid { grid-template-columns: repeat(5, 1fr); } }

/* PRODUCT CARD */
.product-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  animation: fadeUp 0.35s var(--ease) both;
  box-shadow: var(--shadow-sm);
}
.product-card:hover {
  transform: translateY(-4px);
  border-color: var(--orange);
  box-shadow: 0 8px 28px rgba(249,115,22,0.15);
  background: var(--card-hover);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.product-thumb {
  width: 100%; aspect-ratio: 1;
  position: relative;
  background: var(--surface);
  overflow: hidden;
}
.product-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.35s var(--ease);
}
.product-card:hover .product-thumb img { transform: scale(1.07); }
.thumb-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  background: linear-gradient(135deg, var(--surface), var(--border));
}

.card-badges {
  position: absolute; top: 8px; left: 8px;
  display: flex; flex-direction: column; gap: 4px;
  z-index: 2;
}
.badge {
  font-size: 9px; font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.badge-new   { background: var(--info); color: #fff; }
.badge-offer { background: var(--danger); color: #fff; }

.card-views {
  position: absolute; bottom: 7px; right: 7px;
  font-size: 10px; color: #CBD5E1;
  background: rgba(0,0,0,0.55);
  padding: 2px 7px; border-radius: 99px;
  backdrop-filter: blur(4px);
  z-index: 2;
}

.product-info { padding: 10px 11px 12px; }
.p-category {
  font-size: 9px; font-weight: 700;
  color: var(--orange);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 3px;
}
.p-name {
  font-weight: 600; font-size: 13px;
  line-height: 1.35; color: var(--text);
  margin-bottom: 3px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.p-brand { font-size: 10px; color: var(--text-3); margin-bottom: 5px; }
.p-price {
  font-size: 16px; font-weight: 800;
  color: var(--orange);
  letter-spacing: -0.3px;
}
.p-price.no-price {
  font-size: 11px; font-weight: 500;
  color: var(--text-3); letter-spacing: 0;
}

/* ================================
   EMPTY / LOADING
================================ */
.empty-state { text-align: center; padding: 56px 24px; }
.empty-icon { font-size: 56px; margin-bottom: 14px; }
.empty-title { font-weight: 700; font-size: 17px; color: var(--text-2); margin-bottom: 5px; }
.empty-sub { font-size: 13px; color: var(--text-3); }

.loading-wrap { display: flex; align-items: center; justify-content: center; padding: 48px; }
.spinner {
  width: 34px; height: 34px;
  border: 3px solid var(--border);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ================================
   WA FLOAT
================================ */
.wa-float {
  position: fixed; bottom: 80px; right: 16px;
  z-index: 90;
  background: var(--wa);
  border: none; border-radius: 50%;
  width: 54px; height: 54px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(37,211,102,0.45);
  cursor: pointer; font-size: 26px;
  transition: var(--transition);
  animation: pulse-wa 3s ease-in-out infinite;
}
.wa-float:hover { transform: scale(1.1); animation: none; }
@keyframes pulse-wa {
  0%, 100% { box-shadow: 0 4px 20px rgba(37,211,102,0.45); }
  50%       { box-shadow: 0 4px 30px rgba(37,211,102,0.7); }
}

/* ================================
   ADMIN PANEL
================================ */
.admin-header-bar {
  background: var(--surface);
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.admin-header-text h2 {
  font-size: 22px; font-weight: 800;
  color: var(--text); letter-spacing: -0.5px;
}
.admin-header-text p { font-size: 12px; color: var(--text-3); margin-top: 2px; }

.admin-tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
}
.admin-tab {
  padding: 11px 16px;
  font-size: 12px; font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer; border: none; background: none;
  position: relative;
  transition: var(--transition);
}
.admin-tab:hover { color: var(--text-2); }
.admin-tab.active { color: var(--orange); }
.admin-tab.active::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: var(--orange);
  border-radius: 2px 2px 0 0;
}

.admin-view { padding: 16px; }

.add-btn {
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  border: none; border-radius: var(--radius-md);
  padding: 10px 18px;
  font-weight: 700; font-size: 13px;
  color: #fff; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: var(--transition);
  box-shadow: 0 2px 10px rgba(249,115,22,0.4);
  white-space: nowrap;
  letter-spacing: 0.2px;
}
.add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(249,115,22,0.5); }

/* STATS */
.stats-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px; margin-bottom: 16px;
}
@media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px;
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
}
.stat-card:hover { border-color: var(--orange); box-shadow: 0 4px 16px rgba(249,115,22,0.1); }
.stat-icon { font-size: 20px; margin-bottom: 8px; display: block; }
.stat-num {
  font-size: 28px; font-weight: 800;
  color: var(--text); letter-spacing: -1px; line-height: 1;
}
.stat-label {
  font-size: 10px; font-weight: 600;
  color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 4px;
}

.section-title {
  font-size: 12px; font-weight: 700;
  color: var(--text-3); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}

/* ADMIN SEARCH */
.admin-search-wrap { position: relative; margin-bottom: 12px; }
.admin-search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px; color: var(--text-3); pointer-events: none;
}
.admin-search-input {
  width: 100%; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 10px 14px 10px 38px;
  font-size: 13px; color: var(--text); outline: none;
  transition: var(--transition);
}
.admin-search-input::placeholder { color: var(--text-3); }
.admin-search-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,115,22,0.1); }
.light-mode .admin-search-input { background: #fff; }

/* ADMIN PRODUCT ITEM */
.admin-product-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px;
  transition: var(--transition);
  animation: fadeUp 0.25s var(--ease) both;
  box-shadow: var(--shadow-sm);
}
.admin-product-item:hover { border-color: var(--border-light); background: var(--card-hover); }

.admin-thumb {
  width: 54px; height: 54px;
  border-radius: var(--radius-md);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0; overflow: hidden;
}
.admin-thumb img { width: 100%; height: 100%; object-fit: cover; }

.admin-product-info { flex: 1; min-width: 0; }
.admin-product-name {
  font-weight: 600; font-size: 14px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.admin-product-meta { font-size: 11px; color: var(--text-3); margin-top: 3px; }

.admin-actions { display: flex; gap: 6px; }
.action-btn {
  width: 33px; height: 33px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: var(--transition);
}
.edit-btn { background: rgba(59,130,246,0.1); color: #3B82F6; border-color: rgba(59,130,246,0.2); }
.edit-btn:hover { background: rgba(59,130,246,0.2); }
.del-btn  { background: rgba(239,68,68,0.1); color: #EF4444; border-color: rgba(239,68,68,0.2); }
.del-btn:hover { background: rgba(239,68,68,0.2); }

.logout-btn {
  width: 100%; margin-top: 20px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 11px;
  font-size: 13px; font-weight: 600;
  color: var(--text-3); cursor: pointer;
  transition: var(--transition);
}
.logout-btn:hover { border-color: var(--danger); color: var(--danger); }

/* CATEGORIES ADMIN */
.cat-admin-wrap { margin-bottom: 16px; }
.cat-add-row {
  display: flex; gap: 8px; margin-bottom: 10px;
}
.cat-input {
  flex: 1; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 9px 13px;
  font-size: 13px; color: var(--text); outline: none;
  transition: var(--transition);
}
.cat-input::placeholder { color: var(--text-3); }
.cat-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,115,22,0.1); }
.cat-add-btn {
  background: var(--orange); color: #fff;
  border: none; border-radius: var(--radius-md);
  padding: 9px 16px; font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: var(--transition);
}
.cat-add-btn:hover { background: var(--orange-dark); }

.cat-list { display: flex; flex-wrap: wrap; gap: 8px; }
.cat-tag {
  display: flex; align-items: center; gap: 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px; font-weight: 500; color: var(--text-2);
  transition: var(--transition);
}
.cat-tag:hover { border-color: var(--border-light); }
.cat-tag-del {
  background: none; border: none;
  color: var(--text-3); cursor: pointer;
  font-size: 13px; padding: 0; line-height: 1;
  transition: var(--transition);
}
.cat-tag-del:hover { color: var(--danger); }

/* ================================
   LOGIN
================================ */
.login-view {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: calc(100vh - 116px); padding: 24px;
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 32px 28px;
  width: 100%; max-width: 360px;
  box-shadow: var(--shadow-lg);
  animation: fadeUp 0.3s var(--ease) both;
}
.login-logo { text-align: center; margin-bottom: 26px; }
.login-logo-icon {
  width: 60px; height: 60px;
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 12px;
  box-shadow: var(--shadow-orange);
}
.login-logo h2 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.login-logo p { font-size: 12px; color: var(--text-3); margin-top: 3px; }

.login-error {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  color: #EF4444;
  padding: 9px 13px;
  border-radius: var(--radius-sm);
  font-size: 12px; text-align: center;
  margin-bottom: 14px; display: none;
}
.login-error.show { display: block; }

/* ================================
   FORM ELEMENTS
================================ */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--text-3); text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 6px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 10px 13px;
  font-size: 14px; color: var(--text); outline: none;
  transition: var(--transition);
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-3); }
.form-textarea { resize: vertical; min-height: 76px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.light-mode .form-input, .light-mode .form-select, .light-mode .form-textarea { background: #fff; }

.primary-btn, .login-btn, .save-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--orange), var(--orange-dark));
  border: none; border-radius: var(--radius-md);
  padding: 13px; font-weight: 700; font-size: 15px;
  color: #fff; cursor: pointer;
  letter-spacing: 0.2px;
  transition: var(--transition);
  box-shadow: 0 2px 10px rgba(249,115,22,0.4);
}
.primary-btn:hover, .login-btn:hover, .save-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 18px rgba(249,115,22,0.5);
}
.primary-btn:disabled, .save-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.demo-hint {
  text-align: center; font-size: 11px; color: var(--text-3);
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.demo-hint code {
  background: var(--surface); padding: 1px 6px;
  border-radius: 4px; color: var(--orange); font-size: 11px;
}

/* ================================
   MODAL / BOTTOM SHEET
================================ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(6px);
}
.modal-overlay.open { display: flex; }

.modal-body {
  background: var(--card);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%; max-width: 540px;
  max-height: 92vh; overflow-y: auto;
  padding: 20px 18px 36px;
  border-top: 1px solid var(--border);
  animation: slideUp 0.32s cubic-bezier(0.34,1.4,0.64,1) both;
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.modal-handle {
  width: 38px; height: 4px;
  background: var(--border-light);
  border-radius: 2px; margin: 0 auto 16px;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.modal-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
.close-btn {
  width: 32px; height: 32px;
  background: var(--border); border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; color: var(--text-3);
  transition: var(--transition);
}
.close-btn:hover { background: var(--danger); color: #fff; }

/* PHOTO UPLOAD */
.photo-upload-area {
  border: 2px dashed var(--border-light);
  border-radius: var(--radius-md);
  padding: 22px; text-align: center;
  cursor: pointer; position: relative; overflow: hidden;
  margin-bottom: 14px; transition: var(--transition);
}
.photo-upload-area:hover { border-color: var(--orange); background: var(--orange-dim); }
.photo-upload-area input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.upload-icon { font-size: 30px; display: block; margin-bottom: 6px; }
.upload-text { font-size: 13px; color: var(--text-2); font-weight: 500; }
.upload-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }

.upload-status { font-size: 12px; margin-bottom: 8px; min-height: 1em; text-align: center; }
.upload-status.uploading { color: #F97316; }
.upload-status.done  { color: var(--success); }
.upload-status.error { color: var(--danger); }

.photo-preview-img {
  width: 100%; height: 148px; object-fit: cover;
  border-radius: var(--radius-md); margin-bottom: 14px;
  display: none; border: 1px solid var(--border);
}
.photo-preview-img.show { display: block; }

/* BADGE TOGGLES */
.badge-toggles { display: flex; gap: 8px; flex-wrap: wrap; }
.badge-toggle {
  padding: 6px 13px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  font-size: 11px; font-weight: 700;
  cursor: pointer; background: transparent; color: var(--text-3);
  transition: var(--transition);
  letter-spacing: 0.3px;
}
.badge-toggle:hover { border-color: var(--text-2); color: var(--text-2); }
.badge-toggle.active-new   { border-color: var(--info); background: rgba(59,130,246,0.12); color: #60A5FA; }
.badge-toggle.active-offer { border-color: var(--danger); background: rgba(239,68,68,0.12); color: #F87171; }

/* ================================
   PRODUCT DETAIL
================================ */
.detail-modal-wrap {
  background: var(--card);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%; max-width: 540px;
  max-height: 92vh; overflow-y: auto;
  animation: slideUp 0.32s cubic-bezier(0.34,1.4,0.64,1) both;
  border-top: 1px solid var(--border);
}
.detail-img-wrap {
  width: 100%; aspect-ratio: 4/3; max-height: 280px;
  overflow: hidden; position: relative; background: var(--surface);
}
.detail-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.detail-img-emoji {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 84px;
  background: linear-gradient(135deg, var(--surface), var(--border));
}
.detail-close {
  position: absolute; top: 12px; right: 12px;
  width: 34px; height: 34px;
  background: rgba(0,0,0,0.6); border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; color: #fff;
  backdrop-filter: blur(4px); transition: var(--transition); z-index: 2;
}
.detail-close:hover { background: rgba(239,68,68,0.8); }

.detail-info { padding: 18px 18px 28px; }
.detail-cat {
  display: inline-block;
  background: var(--orange-dim); border: 1px solid rgba(249,115,22,0.3);
  color: var(--orange); padding: 3px 11px; border-radius: 6px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 9px;
}
.detail-name {
  font-size: 26px; font-weight: 800; color: var(--text);
  line-height: 1.15; margin-bottom: 5px; letter-spacing: -0.5px;
}
.detail-brand { font-size: 13px; color: var(--text-3); margin-bottom: 10px; }
.detail-price {
  font-size: 32px; font-weight: 800;
  color: var(--orange); margin-bottom: 4px; letter-spacing: -1px;
}
.detail-price.no-price { font-size: 15px; font-weight: 500; color: var(--text-3); letter-spacing: 0; }
.detail-views { font-size: 11px; color: var(--text-3); margin-bottom: 13px; }
.detail-desc {
  font-size: 14px; line-height: 1.7; color: var(--text-2); margin-bottom: 20px;
}

.wa-contact-btn {
  width: 100%;
  background: var(--wa); border: none; border-radius: var(--radius-md);
  padding: 15px; font-weight: 700; font-size: 16px;
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: var(--transition);
  box-shadow: 0 4px 16px rgba(37,211,102,0.35);
}
.wa-contact-btn:hover { background: #1EB856; transform: translateY(-1px); }

/* ================================
   TOAST
================================ */
.toast {
  position: fixed; bottom: 88px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--surface);
  border: 1px solid var(--border-light);
  color: var(--text);
  padding: 10px 20px; border-radius: var(--radius-md);
  font-size: 13px; font-weight: 500;
  z-index: 400; opacity: 0;
  transition: all 0.3s cubic-bezier(0.34,1.4,0.64,1);
  pointer-events: none; white-space: nowrap;
  box-shadow: var(--shadow-md);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ================================
   CONFIRM DIALOG
================================ */
.confirm-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 500;
  display: none; align-items: center; justify-content: center;
  padding: 24px; backdrop-filter: blur(6px);
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-xl); padding: 28px;
  max-width: 320px; width: 100%;
  text-align: center; animation: fadeUp 0.2s var(--ease) both;
  box-shadow: var(--shadow-lg);
}
.confirm-icon { font-size: 44px; display: block; margin-bottom: 10px; }
.confirm-title { font-weight: 800; font-size: 17px; margin-bottom: 7px; letter-spacing: -0.3px; }
.confirm-msg { font-size: 13px; color: var(--text-2); margin-bottom: 20px; }
.confirm-actions { display: flex; gap: 10px; }
.confirm-cancel {
  flex: 1; background: transparent;
  border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 11px; font-size: 14px; font-weight: 600;
  cursor: pointer; color: var(--text-2); transition: var(--transition);
}
.confirm-cancel:hover { border-color: var(--text-2); }
.confirm-ok {
  flex: 1; background: var(--danger); border: none; border-radius: var(--radius-md);
  padding: 11px; font-size: 14px; font-weight: 700;
  cursor: pointer; color: #fff; transition: var(--transition);
}
.confirm-ok:hover { background: #DC2626; }

/* ================================
   BOTTOM NAV
================================ */
.bottom-nav { display: none; }
@media (max-width: 600px) {
  .view-tabs { display: none; }
  .bottom-nav {
    display: flex; position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 95; height: 62px;
  }
  .bn-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    border: none; background: none; cursor: pointer;
    color: var(--text-3); font-size: 9px; font-weight: 600;
    letter-spacing: 0.8px; text-transform: uppercase;
    transition: var(--transition);
  }
  .bn-item.active { color: var(--orange); }
  .bn-icon { font-size: 20px; }
  .wa-float { bottom: 74px; }
  .toast  { bottom: 74px; }
}

/* ================================
   MISC
================================ */
.spacer-bottom { height: 90px; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }

/* Responsive admin panel */
@media (max-width: 480px) {
  .admin-header-bar { flex-direction: column; align-items: flex-start; }
  .add-btn { width: 100%; justify-content: center; }
  .form-row { grid-template-columns: 1fr; }
}

/* ================================
   PRODUCT CARD IMPROVEMENTS
================================ */
.product-thumb { aspect-ratio: 4/3; }

.card-multi-img {
  position: absolute; bottom: 7px; left: 7px;
  font-size: 10px; color: #fff;
  background: rgba(0,0,0,0.55);
  padding: 2px 7px; border-radius: 99px;
  backdrop-filter: blur(4px);
  z-index: 2;
}

.p-desc {
  font-size: 11px; color: var(--text-3);
  line-height: 1.45; margin-bottom: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ================================
   IMAGE GALLERY (product detail)
================================ */
.gallery-track {
  position: relative;
  width: 100%; height: 100%;
}

.gallery-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.3s ease;
  cursor: zoom-in;
}
.gallery-img.active {
  opacity: 1;
  position: relative;
}
/* stack all imgs absolutely except active */
.gallery-track .gallery-img:not(.active) {
  position: absolute;
}

.gallery-dots {
  position: absolute; bottom: 10px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 6px;
  z-index: 5; pointer-events: none;
}
.gallery-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transition: all 0.2s ease;
  pointer-events: all;
  cursor: pointer;
}
.gallery-dot.active {
  background: #fff;
  transform: scale(1.2);
}

.gallery-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 5;
  background: rgba(0,0,0,0.45);
  border: none; border-radius: 50%;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 20px; font-weight: 300;
  cursor: pointer;
  backdrop-filter: blur(4px);
  transition: background 0.2s ease;
  line-height: 1;
}
.gallery-arrow:hover { background: rgba(0,0,0,0.7); }
.gallery-prev { left: 10px; }
.gallery-next { right: 10px; }

/* ================================
   LIGHTBOX
================================ */
.lightbox-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
  animation: fadeIn 0.18s ease both;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.lightbox-inner {
  position: relative;
  max-width: min(96vw, 700px);
  max-height: 92vh;
  display: flex; align-items: center; justify-content: center;
}

.lightbox-img {
  max-width: 100%;
  max-height: 88vh;
  object-fit: contain;
  border-radius: var(--radius-md);
  user-select: none;
}

.lightbox-close {
  position: fixed; top: 16px; right: 16px;
  width: 38px; height: 38px;
  background: rgba(255,255,255,0.15);
  border: none; border-radius: 50%;
  color: #fff; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 10;
  transition: background 0.2s;
}
.lightbox-close:hover { background: rgba(239,68,68,0.7); }

.lightbox-arrow {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.12);
  border: none; border-radius: 50%;
  width: 44px; height: 44px;
  color: #fff; font-size: 24px; font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 10;
  transition: background 0.2s;
  line-height: 1;
}
.lightbox-arrow:hover { background: rgba(255,255,255,0.25); }
.lightbox-prev { left: 12px; }
.lightbox-next { right: 12px; }

.lightbox-counter {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.7);
  font-size: 13px; font-weight: 500;
  background: rgba(0,0,0,0.4);
  padding: 4px 14px; border-radius: 99px;
  backdrop-filter: blur(4px);
}

/* ================================
   ADMIN — MULTI-IMAGE LIST
================================ */
.img-list {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-bottom: 10px;
  min-height: 80px;
}

.img-item {
  position: relative;
  width: 80px; height: 80px;
  border-radius: var(--radius-md);
  overflow: hidden;
  border: 1.5px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.img-item img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.img-del-btn {
  position: absolute; top: 3px; right: 3px;
  width: 20px; height: 20px;
  background: rgba(0,0,0,0.65);
  border: none; border-radius: 50%;
  color: #fff; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.2s;
  line-height: 1;
}
.img-del-btn:hover { background: rgba(239,68,68,0.85); }

.img-main-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(249,115,22,0.85);
  color: #fff; font-size: 9px; font-weight: 700;
  text-align: center; padding: 2px 0;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.img-add-slot {
  width: 80px; height: 80px;
  border-radius: var(--radius-md);
  border: 2px dashed var(--border-light);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: var(--transition);
  background: transparent;
}
.img-add-slot:hover { border-color: var(--orange); background: var(--orange-dim); }
.img-add-icon { font-size: 22px; color: var(--text-3); line-height: 1; }
.img-add-text { font-size: 10px; color: var(--text-3); font-weight: 500; }

/* admin thumb multi-count badge */
.admin-thumb { position: relative; }
.admin-thumb-count {
  position: absolute; bottom: -4px; right: -4px;
  background: var(--orange);
  color: #fff; font-size: 9px; font-weight: 700;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid var(--bg);
}

/* Cat emoji input sizing */
.cat-emoji-input { max-width: 100px !important; flex: none !important; }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo" id="logoBtn">
    <div class="logo-icon">🔩</div>
    <div class="logo-text-wrap">
      <span class="logo-name">Ferretería Parada</span>
      <span class="logo-sub">Catálogo Digital</span>
    </div>
  </div>
  <div class="top-actions">
    <button class="icon-btn" id="themeBtnTop" title="Cambiar tema">🌙</button>
    <button class="icon-btn" id="adminBtnTop" title="Panel admin">⚙️</button>
  </div>
</header>

<!-- TABS DESKTOP -->
<nav class="view-tabs">
  <button class="tab active" id="tab-catalog" data-view="catalog">
    <span class="tab-icon">🏪</span>Catálogo
  </button>
  <button class="tab" id="tab-admin" data-view="admin">
    <span class="tab-icon">⚙️</span>Admin
  </button>
</nav>

<!-- MAIN -->
<main>
  <!-- CATALOG -->
  <div id="view-catalog" class="catalog-view">
    <div class="hero">
      <div class="hero-badge">🔩 Ferretería Parada</div>
      <h1 class="hero-title">Tu ferretería<br><span class="hero-accent">de confianza</span></h1>
      <p class="hero-sub">Herramientas, materiales y más para tus proyectos</p>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="searchInput" class="search-input" type="search" placeholder="Buscar productos, marcas, categorías…" autocomplete="off">
        <button class="search-clear" id="searchClearBtn" style="display:none">✕</button>
      </div>
    </div>

    <div class="catalog-body">
      <!-- SHARE -->
      <div class="share-bar">
        <span class="share-label">📢 Compartir catálogo</span>
        <div class="share-btns">
          <button class="share-btn share-wa" id="shareWaBtn">💬 WhatsApp</button>
          <button class="share-btn share-fb" id="shareFbBtn">📘 Facebook</button>
          <button class="share-btn share-copy" id="shareCopyBtn">🔗 Copiar enlace</button>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="filters-row" id="categoriesList">
        <button class="chip active" data-cat="all">Todos</button>
      </div>

      <!-- SORT ROW -->
      <div class="sort-row">
        <span class="results-label" id="resultsLabel">0 productos</span>
        <select id="sortSelect" class="sort-select">
          <option value="newest">Más reciente</option>
          <option value="price-asc">Precio ↑</option>
          <option value="price-desc">Precio ↓</option>
          <option value="popular">Más vistos</option>
        </select>

// ============================================================
// HELPERS
// ============================================================
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function formatPrice(price) {
  if (price == null || price === '') return null;
  return new Intl.NumberFormat('es-SV', { style: 'currency', currency: 'USD' }).format(price);
}

function getCatInfo(catName) {
  return STATE.categories.find(c => c.name === catName) || { emoji: '', name: catName };
}

function getEmoji(catName) {
  return getCatInfo(catName).emoji || '';
}

/** Returns a normalized images array for a product (supports old imageUrl field too) */
function getProductImages(p) {
  if (p.images && p.images.length > 0) return p.images;
  if (p.imageUrl) return [p.imageUrl];
  return [];
}

function showToast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(STATE.toastTimer);
  STATE.toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ============================================================
// MODAL
// ============================================================
function showModal(html) {
  const ov = document.getElementById('modal-overlay');
  ov.innerHTML = html;
  ov.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const ov = document.getElementById('modal-overlay');
  ov.classList.remove('open');
  ov.innerHTML = '';
  document.body.style.overflow = '';
  STATE.editingId      = null;
  STATE.uploadedImages = [];
  STATE.galleryImages  = [];
  STATE.galleryIndex   = 0;
  STATE.tagNew         = false;
  STATE.tagOffer       = false;
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ============================================================
// THEME
// ============================================================
function applyTheme(light) {
  STATE.lightMode = light;
  document.documentElement.classList.toggle('light-mode', light);
  document.getElementById('themeBtnTop').textContent = light ? '🌙' : '☀️';
}

function loadTheme() {
  try {
    applyTheme(localStorage.getItem('fp_theme') === 'light');
  } catch(e) {}
}

document.getElementById('themeBtnTop').addEventListener('click', () => {
  applyTheme(!STATE.lightMode);
  try { localStorage.setItem('fp_theme', STATE.lightMode ? 'light' : 'dark'); } catch(e) {}
});

// ============================================================
// CATEGORIES BAR (catalog)
// ============================================================
function rebuildCategories() {
  const usedCats = [...new Set(STATE.products.map(p => p.category).filter(Boolean).sort())];
  const cats = ['all', ...usedCats];
  const list = document.getElementById('categoriesList');
  if (!list) return;

  list.innerHTML = cats.map(c => {
    const info = c === 'all' ? { emoji: '🏪', name: 'Todos' } : getCatInfo(c);
    const label = info.emoji ? `${info.emoji} ${esc(info.name || c)}` : esc(info.name || c);
    return `<button class="chip ${c === STATE.activeFilter ? 'active' : ''}" data-cat="${esc(c)}">${label}</button>`;
  }).join('');

  list.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      STATE.activeFilter = btn.dataset.cat;
      list.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      renderCatalog();
    });
  });
}

// ============================================================
// CATALOG RENDER
// ============================================================
function getFiltered() {
  let list = [...STATE.products];
  if (STATE.activeFilter !== 'all') list = list.filter(p => p.category === STATE.activeFilter);
  if (STATE.searchQ) {
    const q = STATE.searchQ;
    list = list.filter(p =>
      (p.name        || '').toLowerCase().includes(q) ||
      (p.category    || '').toLowerCase().includes(q) ||
      (p.brand       || '').toLowerCase().includes(q) ||
      (p.description || '').toLowerCase().includes(q)
    );
  }
  switch (STATE.sortMode) {
    case 'price-asc':  list.sort((a,b) => (a.price ?? Infinity) - (b.price ?? Infinity)); break;
    case 'price-desc': list.sort((a,b) => (b.price ?? -Infinity) - (a.price ?? -Infinity)); break;
    case 'popular':    list.sort((a,b) => (b.views || 0) - (a.views || 0)); break;
    default:
      list.sort((a,b) => {
        const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : (a.createdAt || 0);
        const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : (b.createdAt || 0);
        return tb - ta;
      });
  }
  return list;
}

function renderCatalog() {
  const grid    = document.getElementById('productsGrid');
  const empty   = document.getElementById('emptyState');
  const loading = document.getElementById('loadingState');
  const label   = document.getElementById('resultsLabel');
  if (!grid) return;

  if (loading) loading.style.display = 'none';

  const list = getFiltered();
  if (label) label.textContent = `${list.length} producto${list.length !== 1 ? 's' : ''}`;

  if (list.length === 0) {
    grid.innerHTML = '';
    if (empty) empty.style.display = 'block';
    return;
  }
  if (empty) empty.style.display = 'none';

  grid.innerHTML = list.map((p, i) => {
    const price    = formatPrice(p.price);
    const info     = getCatInfo(p.category);
    const imgs     = getProductImages(p);
    const imgUrl   = imgs[0];
    const hasImg   = !!imgUrl;
    const multiImg = imgs.length > 1;

    const imgHtml = hasImg
      ? `<img src="${esc(imgUrl)}" alt="${esc(p.name)}" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';

    return `
    <div class="product-card" data-id="${p.id}" style="animation-delay:${i * 0.04}s">
      <div class="product-thumb">
        ${imgHtml}
        <div class="thumb-placeholder" ${hasImg ? 'style="display:none"' : ''}>${info.emoji || '📦'}</div>
        <div class="card-badges">
          ${p.isNew   ? '<span class="badge badge-new">NUEVO</span>'  : ''}
          ${p.isOffer ? '<span class="badge badge-offer">OFERTA</span>' : ''}
        </div>
        ${multiImg ? `<div class="card-multi-img">📷 ${imgs.length}</div>` : ''}
        <div class="card-views">👁 ${p.views || 0}</div>
      </div>
      <div class="product-info">
        ${p.category ? `<div class="p-category">${info.emoji ? info.emoji + ' ' : ''}${esc(p.category)}</div>` : ''}
        <div class="p-name">${esc(p.name)}</div>
        ${p.brand ? `<div class="p-brand">${esc(p.brand)}</div>` : ''}
        ${p.description ? `<div class="p-desc">${esc(p.description)}</div>` : ''}
        <div class="p-price ${price ? '' : 'no-price'}">${price ?? 'Consultar precio'}</div>
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.product-card').forEach(card => {
    card.addEventListener('click', () => openProductDetail(card.dataset.id));
  });
}

// ============================================================
// PRODUCT DETAIL — GALLERY
// ============================================================
function openProductDetail(id) {
  const p = STATE.products.find(x => x.id === id);
  if (!p) return;

  const imgs  = getProductImages(p);
  const info  = getCatInfo(p.category);
  const price = formatPrice(p.price);

  STATE.galleryImages = imgs;
  STATE.galleryIndex  = 0;

  function buildGallery() {
    if (imgs.length === 0) {
      return `<div class="detail-img-emoji">${info.emoji || '📦'}</div>`;
    }
    const track = imgs.map((url, i) =>
      `<img class="gallery-img${i === 0 ? ' active' : ''}" src="${esc(url)}" alt="${esc(p.name)}" data-idx="${i}" loading="lazy">`
    ).join('');

    const dots = imgs.length > 1
      ? `<div class="gallery-dots">${imgs.map((_,i) =>
          `<span class="gallery-dot${i === 0 ? ' active' : ''}" data-idx="${i}"></span>`
        ).join('')}</div>`
      : '';

    const arrows = imgs.length > 1
      ? `<button class="gallery-arrow gallery-prev" id="galleryPrev">‹</button>
         <button class="gallery-arrow gallery-next" id="galleryNext">›</button>`
      : '';

    return `<div class="gallery-track" id="galleryTrack">${track}</div>${dots}${arrows}`;
  }

  showModal(`
    <div class="detail-modal-wrap" id="detailWrap">
      <div style="position:relative">
        <div class="detail-img-wrap" id="galleryWrap">
          ${buildGallery()}
          <button class="detail-close" id="detailCloseBtn">✕</button>
        </div>
      </div>
      <div class="detail-info">
        ${p.category ? `<span class="detail-cat">${info.emoji ? info.emoji + ' ' : ''}${esc(p.category)}</span>` : ''}
        <div class="detail-name">${esc(p.name)}</div>
        ${p.brand ? `<div class="detail-brand">Marca: <strong>${esc(p.brand)}</strong></div>` : ''}
        <div class="detail-price ${price ? '' : 'no-price'}">${price ?? 'Consultar precio'}</div>
        <div class="detail-views">👁 ${(p.views || 0) + 1} vistas</div>
        ${p.description ? `<div class="detail-desc">${esc(p.description)}</div>` : ''}
        <button class="wa-contact-btn" id="waContactBtn">💬 Consultar por WhatsApp</button>
      </div>
    </div>`);

  // ── Gallery navigation ──────────────────────────────────
  function goTo(idx) {
    const allImgs = document.querySelectorAll('.gallery-img');
    const allDots = document.querySelectorAll('.gallery-dot');
    STATE.galleryIndex = ((idx % imgs.length) + imgs.length) % imgs.length;
    allImgs.forEach((el, i) => el.classList.toggle('active', i === STATE.galleryIndex));
    allDots.forEach((el, i) => el.classList.toggle('active', i === STATE.galleryIndex));
  }

  document.getElementById('galleryPrev')?.addEventListener('click', e => { e.stopPropagation(); goTo(STATE.galleryIndex - 1); });
  document.getElementById('galleryNext')?.addEventListener('click', e => { e.stopPropagation(); goTo(STATE.galleryIndex + 1); });

  document.querySelectorAll('.gallery-dot').forEach(dot => {
    dot.addEventListener('click', e => { e.stopPropagation(); goTo(parseInt(dot.dataset.idx)); });
  });

  // Tap on image → lightbox
  document.querySelectorAll('.gallery-img').forEach(img => {
    img.addEventListener('click', e => {
      e.stopPropagation();
      openLightbox(imgs, STATE.galleryIndex);
    });
  });

  // Swipe support
  const gwrap = document.getElementById('galleryWrap');
  let swipeX = 0;
  gwrap?.addEventListener('touchstart', e => { swipeX = e.touches[0].clientX; }, { passive: true });
  gwrap?.addEventListener('touchend', e => {
    const diff = swipeX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 44) goTo(STATE.galleryIndex + (diff > 0 ? 1 : -1));
  }, { passive: true });

  // ── Events ─────────────────────────────────────────────
  document.getElementById('detailCloseBtn').addEventListener('click', closeModal);
  document.getElementById('detailWrap').addEventListener('click', e => e.stopPropagation());

  const waMsg = `Hola ${STORE_NAME}, me interesa obtener más información sobre: *${p.name}*.`;
  document.getElementById('waContactBtn').addEventListener('click', () => {
    window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(waMsg)}`, '_blank');
  });

  if (firebaseReady) {
    updateDoc(doc(db, 'products', id), { views: increment(1) }).catch(() => {});
  }
}

// ============================================================
// LIGHTBOX (fullscreen image viewer)
// ============================================================
function openLightbox(images, startIdx) {
  let idx = startIdx;
  const lb = document.createElement('div');
  lb.className = 'lightbox-overlay';

  function render() {
    lb.innerHTML = `
      <div class="lightbox-inner" id="lbInner">
        <button class="lightbox-close" id="lbClose">✕</button>
        <img class="lightbox-img" src="${esc(images[idx])}" alt="" id="lbImg">
        ${images.length > 1 ? `
          <button class="lightbox-arrow lightbox-prev" id="lbPrev">‹</button>
          <button class="lightbox-arrow lightbox-next" id="lbNext">›</button>
          <div class="lightbox-counter">${idx + 1} / ${images.length}</div>` : ''}
      </div>`;
    bindLb();
  }

  function bindLb() {
    document.getElementById('lbClose').addEventListener('click', destroy);
    document.getElementById('lbPrev')?.addEventListener('click', e => { e.stopPropagation(); idx = (idx - 1 + images.length) % images.length; render(); });
    document.getElementById('lbNext')?.addEventListener('click', e => { e.stopPropagation(); idx = (idx + 1) % images.length; render(); });
    document.getElementById('lbInner').addEventListener('click', e => e.stopPropagation());

    let sx = 0;
    lb.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
    lb.addEventListener('touchend', e => {
      const d = sx - e.changedTouches[0].clientX;
      if (Math.abs(d) > 44) { idx = (idx + (d > 0 ? 1 : -1) + images.length) % images.length; render(); }
    }, { passive: true });
  }

  function destroy() {
    document.body.removeChild(lb);
  }

  lb.addEventListener('click', destroy);
  document.body.appendChild(lb);
  render();
}

function showView(view) {

async function addCategory() {

  if (STATE.categories.some(c => c.name.toLowerCase() === name.toLowerCase())) {
    showToast('⚠️ Esa categoría ya existe'); return;
  }
  if (!firebaseReady) { showToast('⚠️ Firebase no está configurado'); return; }

// ============================================================
// IMAGE LIST MANAGEMENT
// ============================================================
function refreshImgList() {
  const wrap = document.getElementById('imgListWrap');
  if (!wrap) return;

  const canAdd = STATE.uploadedImages.length < 5;

  wrap.innerHTML =
    STATE.uploadedImages.map((url, i) => `
      <div class="img-item">
        <img src="${esc(url)}" alt="imagen ${i+1}">
        <button class="img-del-btn" data-idx="${i}" title="Eliminar imagen">✕</button>
        ${i === 0 ? '<div class="img-main-label">Principal</div>' : ''}
      </div>`).join('') +
    (canAdd ? `
      <div class="img-add-slot" id="addImgSlot">
        <input type="file" id="imgFile" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%">
        <span class="img-add-icon">＋</span>
        <span class="img-add-text">Agregar</span>
      </div>` : '');

  bindImgListEvents();
}

function bindImgListEvents() {
  document.getElementById('imgFile')?.addEventListener('change', handleImageUpload);
  document.querySelectorAll('.img-del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      STATE.uploadedImages.splice(idx, 1);
      refreshImgList();
      setUploadStatus('', '');
    });
  });
}

// ============================================================
// IMAGE UPLOAD (Cloudinary)
// ============================================================
async function handleImageUpload(e) {
  const file = e.target.files?.[0];
  if (!file) return;

  if (file.size > 5 * 1024 * 1024) { showToast('⚠️ Imagen muy grande (máx 5MB)'); return; }
  if (STATE.uploadedImages.length >= 5) { showToast('⚠️ Máximo 5 imágenes por producto'); return; }

  setUploadStatus('Subiendo imagen…', 'uploading');

  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', UPLOAD_PRESET);

  try {
    const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
    const data = await res.json();
    if (data.secure_url) {
      STATE.uploadedImages.push(data.secure_url);
      setUploadStatus(`✓ Imagen ${STATE.uploadedImages.length} subida`, 'done');
      showToast('✅ Imagen subida');
      refreshImgList();
    } else {
      throw new Error(data.error?.message || 'Error desconocido');
    }
  } catch (err) {
    setUploadStatus(`✗ Error: ${err.message}`, 'error');
    showToast('❌ Error al subir imagen');
  }
}

function setUploadStatus(msg, cls) {
  const el = document.getElementById('uploadStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = `upload-status ${cls}`;
}

// ============================================================
// SAVE PRODUCT
// ============================================================
async function saveProduct() {
  if (!firebaseReady) { showToast('⚠️ Firebase no configurado'); return; }

  const name = (document.getElementById('fName')?.value || '').trim();
  if (!name) { showToast('⚠️ El nombre es obligatorio'); document.getElementById('fName')?.focus(); return; }

  const priceRaw = document.getElementById('fPrice')?.value;
  const price    = priceRaw ? parseFloat(priceRaw) : null;
  if (priceRaw && (isNaN(price) || price < 0)) { showToast('⚠️ Precio inválido'); return; }

  const data = {
    name,
    category:    document.getElementById('fCat')?.value || 'General',
    brand:       (document.getElementById('fBrand')?.value || '').trim() || null,
    description: (document.getElementById('fDesc')?.value  || '').trim() || null,
    price:       isNaN(price) ? null : price,
    isNew:       STATE.tagNew,
    isOffer:     STATE.tagOffer,
    images:      STATE.uploadedImages,
    imageUrl:    STATE.uploadedImages[0] || null,  // backward compat
    updatedAt:   serverTimestamp(),
  };

  const btn = document.getElementById('saveProductBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }

  try {
    if (STATE.editingId) {
      await updateDoc(doc(db, 'products', STATE.editingId), data);
      showToast('✅ Producto actualizado');
    } else {
      data.createdAt = serverTimestamp();
      data.views     = 0;
      await addDoc(collection(db, 'products'), data);
      showToast('✅ Producto agregado');
    }
    closeModal();
    renderAdminTabContent();
  } catch (err) {
    showToast(`❌ ${err.message}`);
    if (btn) { btn.disabled = false; btn.textContent = '💾 Guardar producto'; }
  }
}

// ============================================================
// DELETE / CONFIRM
// ============================================================
function confirmDelete(id, type = 'product') {
  STATE.pendingDeleteId   = id;
  STATE.pendingDeleteType = type;
  const title = document.getElementById('confirmTitle');
  const msg   = document.getElementById('confirmMsg');
  const icon  = document.getElementById('confirmIcon');
  const okBtn = document.getElementById('confirmOkBtn');

  if (type === 'category') {
    if (icon)  icon.textContent  = '🏷️';
    if (title) title.textContent = '¿Eliminar categoría?';
    if (msg)   msg.textContent   = 'Los productos con esta categoría no se modificarán.';
    if (okBtn) okBtn.textContent = 'Eliminar';
  } else {
    if (icon)  icon.textContent  = '🗑️';
    if (title) title.textContent = '¿Eliminar producto?';
    if (msg)   msg.textContent   = 'Esta acción no se puede deshacer.';
    if (okBtn) okBtn.textContent = 'Eliminar';
  }
  document.getElementById('confirm-overlay').classList.add('open');
}

function closeConfirm() {
  STATE.pendingDeleteId   = null;
  STATE.pendingDeleteType = 'product';
  document.getElementById('confirm-overlay').classList.remove('open');
}

document.getElementById('confirmCancelBtn').addEventListener('click', closeConfirm);
document.getElementById('confirmOkBtn').addEventListener('click', async () => {
  if (!STATE.pendingDeleteId) return;
  try {
    if (STATE.pendingDeleteType === 'category') {
      await deleteCategory(STATE.pendingDeleteId);
    } else {
      await deleteDoc(doc(db, 'products', STATE.pendingDeleteId));
      showToast('🗑️ Producto eliminado');
    }
    closeConfirm();
    if (STATE.isLoggedIn && STATE.currentView === 'admin') renderAdminTabContent();
  } catch (err) {
    showToast(`❌ ${err.message}`);
  }
});

// ============================================================
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (document.getElementById('confirm-overlay').classList.contains('open')) { closeConfirm(); return; }
  if (document.getElementById('modal-overlay').classList.contains('open'))   { closeModal();   return; }
  // close lightbox if open
  const lb = document.querySelector('.lightbox-overlay');
  if (lb) document.body.removeChild(lb);
});

// ============================================================
// SEED SAMPLE PRODUCTS
// ============================================================
async function seedSampleData() {
  if (!firebaseReady) return;
  try {
    const snap = await getDocs(collection(db, 'products'));
    if (snap.docs.length >= SAMPLE_PRODUCTS.length) return;

    const existingNames = new Set(snap.docs.map(d => d.data().name));
    for (const p of SAMPLE_PRODUCTS) {
      if (!existingNames.has(p.name)) {
        await addDoc(collection(db, 'products'), {
          ...p,
          imageUrl:  p.images?.[0] || null,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
      }
    }
  } catch (e) {
    // silent
  }
}

// ============================================================
// SEED DEFAULT CATEGORIES
// ============================================================
async function seedDefaultCategories() {
  if (!firebaseReady) return;
  try {
    const snap = await getDocs(collection(db, 'categories'));
    if (!snap.empty) return;
    for (const cat of DEFAULT_CATEGORIES) {
      await addDoc(collection(db, 'categories'), { ...cat, createdAt: serverTimestamp() });
    }
  } catch (e) {
    // silent
  }
}

// ============================================================
// FIREBASE LISTENERS
// ============================================================
function startListening() {
  if (!firebaseReady) {
    const loading = document.getElementById('loadingState');
    if (loading) loading.innerHTML = `
      <div style="text-align:center;padding:32px">
        <div style="font-size:42px;margin-bottom:12px">⚙️</div>
        <div style="font-weight:700;font-size:15px;color:var(--text-2)">Firebase no configurado</div>
        <div style="font-size:12px;color:var(--text-3);margin-top:6px">Configura las credenciales en app.js</div>
      </div>`;
    return;
  }

  onSnapshot(
    query(collection(db, 'categories'), orderBy('createdAt', 'asc')),
    snap => {
      STATE.categories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (STATE.isLoggedIn && STATE.currentView === 'admin') renderAdminTabContent();
    },
    err => console.warn('Categories listener error:', err.message)
  );

  const q = query(collection(db, 'products'), orderBy('createdAt', 'desc'));
  onSnapshot(q, snap => {
    STATE.products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    rebuildCategories();
    renderCatalog();
    if (STATE.isLoggedIn && STATE.currentView === 'admin') renderAdminTabContent();
  }, err => {
    const loading = document.getElementById('loadingState');
    if (loading) loading.innerHTML = `
      <div style="text-align:center;padding:32px;color:var(--danger)">
        ❌ Error de Firebase: ${err.message}
      </div>`;
  });
}

// ============================================================
// INIT
// ============================================================
loadTheme();

if (firebaseReady) {
  seedDefaultCategories().then(() => seedSampleData()).then(() => startListening());
} else {
  startListening();
}

</script>
